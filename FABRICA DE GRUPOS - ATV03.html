<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FÁBRICA DE GRUPOS - PROFª ADRIANA</title>
    <style>
        /* CSS RESET PARA EVITAR SCROLL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Arial', sans-serif; 
            background: #E3F2FD; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
            text-transform: uppercase; 
        }

        /* CABEÇALHO COMPACTO */
        header {
            background: #0D47A1;
            color: white;
            padding: 0.5vh 0;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            z-index: 10;
        }

        /* ÁREA CENTRAL QUE SE AJUSTA À TELA */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1vh;
            min-height: 0;
        }

        /* CAIXA BRANCA COM TAMANHO BASEADO NA ALTURA (VH) */
        .box { 
            width: 95%;
            max-width: 800px;
            height: 80vh; /* Ocupa 80% da altura da tela */
            background: white; 
            padding: 2vh; 
            border-radius: 20px; 
            border: 0.8vh solid #2196F3; 
            box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        h1 { color: #1565C0; font-size: 3.5vh; margin: 0; }
        
        .instrucao { 
            font-size: 2.5vh; 
            background: #BBDEFB; 
            padding: 1vh; 
            border-radius: 10px; 
            width: 100%;
            text-align: center;
        }

        /* GRADE DE EMOJIS DINÂMICA */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 1vh; 
            width: 100%;
            max-width: 500px;
        }

        /* EMOJIS QUE ENCOLHEM SE A TELA FOR PEQUENA */
        .item { 
            font-size: 6vh; 
            padding: 0.5vh; 
            border: 0.4vh solid #EEE; 
            border-radius: 15px; 
            cursor: pointer; 
            background: #FFF; 
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            transition: transform 0.1s;
        }

        .item.selected { border-color: #2196F3; background: #E3F2FD; transform: scale(1.05); }

        /* BOTÃO E TEXTO DE PROGRESSO */
        .controles {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5vh;
        }

        button { 
            padding: 1.5vh 4vh; 
            font-size: 2.5vh; 
            cursor: pointer; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            box-shadow: 0 0.5vh #2E7D32; 
        }

        button:active { box-shadow: none; transform: translateY(0.3vh); }
        
        .progresso { font-size: 1.8vh; color: #666; font-weight: bold; }

        /* RODAPÉ SEMPRE VISÍVEL */
        footer {
            background: #f1f1f1;
            color: #555;
            padding: 0.5vh 0;
            text-align: center;
            font-size: 0.8rem;
            border-top: 1px solid #ccc;
        }

        #tela-nota { display: none; }
        #valor-nota { font-size: 15vh; font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

    <header>ATIVIDADE PRÁTICA - PROFª ADRIANA BETT TEREBINTO</header>

    <main>
        <div id="jogo" class="box">
            <h1>📦 FÁBRICA DE GRUPOS</h1>
            <div class="instrucao">CLIQUE EM TUDO QUE FOR: <br><b id="meta" style="color:#d32f2f">...</b></div>
            
            <div class="grid" id="grade"></div>
            
            <div class="controles">
                <button onclick="proximaFase()" id="btn-acao">PRÓXIMO DESAFIO</button>
                <div class="progresso">DESAFIO: <span id="cont-fase">1</span> DE 10</div>
            </div>
        </div>

        <div id="tela-nota" class="box">
            <h1>🏁 FIM DA ATIVIDADE</h1>
            <p style="font-size: 3vh;">SUA NOTA FINAL FOI:</p>
            <div id="valor-nota">0</div>
            <button onclick="location.reload()">JOGAR DE NOVO</button>
        </div>
    </main>

    <footer>Material Pedagógico - Profª Adriana Bett Terebinto © 2026</footer>

<script>
    const todosItens = [
        {e: "🍎", tipo: "COMIDA"}, {e: "🍕", tipo: "COMIDA"}, {e: "🍔", tipo: "COMIDA"}, {e: "🍦", tipo: "COMIDA"},
        {e: "🐶", tipo: "ANIMAL"}, {e: "🐱", tipo: "ANIMAL"}, {e: "🦁", tipo: "ANIMAL"}, {e: "🐸", tipo: "ANIMAL"},
        {e: "🚗", tipo: "VEÍCULO"}, {e: "✈️", tipo: "VEÍCULO"}, {e: "🚀", tipo: "VEÍCULO"}, {e: "🚲", tipo: "VEÍCULO"},
        {e: "⚽", tipo: "BRINQUEDO"}, {e: "🧸", tipo: "BRINQUEDO"}, {e: "🎨", tipo: "BRINQUEDO"}, {e: "🎮", tipo: "BRINQUEDO"},
        {e: "☀️", tipo: "AMARELO"}, {e: "💡", tipo: "AMARELO"}, {e: "⭐", tipo: "AMARELO"}, {e: "🍌", tipo: "AMARELO"},
        {e: "🍓", tipo: "FRUTA"}, {e: "🍉", tipo: "FRUTA"}, {e: "🍰", tipo: "DOCE"}, {e: "🍬", tipo: "DOCE"},
        {e: "🔵", tipo: "AZUL"}, {e: "👗", tipo: "AZUL"}, {e: "🐟", tipo: "AZUL"}, {e: "🐬", tipo: "AZUL"}
    ];
    
    const tiposSorteio = ["COMIDA", "ANIMAL", "VEÍCULO", "BRINQUEDO", "AMARELO", "FRUTA", "DOCE", "AZUL"];
    let faseAtual = 1;
    let somaNotas = 0;
    let metaAtual = "";

    function iniciarFase() {
        metaAtual = tiposSorteio[Math.floor(Math.random() * tiposSorteio.length)];
        document.getElementById('meta').innerText = metaAtual;
        document.getElementById('cont-fase').innerText = faseAtual;
        if (faseAtual === 10) document.getElementById('btn-acao').innerText = "VER NOTA FINAL";

        const grade = document.getElementById('grade');
        grade.innerHTML = "";
        
        const itensDaMeta = todosItens.filter(i => i.tipo === metaAtual).sort(() => Math.random() - 0.5).slice(0, 3);
        const outrosItens = todosItens.filter(i => i.tipo !== metaAtual).sort(() => Math.random() - 0.5).slice(0, 5);
        const exibicao = [...itensDaMeta, ...outrosItens].sort(() => Math.random() - 0.5);

        exibicao.forEach(item => {
            let div = document.createElement('div');
            div.className = 'item';
            div.innerText = item.e;
            div.onclick = () => div.classList.toggle('selected');
            div.dataset.tipo = item.tipo;
            grade.appendChild(div);
        });
    }

    function proximaFase() {
        calcularNotaFase();
        if (faseAtual < 10) {
            faseAtual++;
            iniciarFase();
        } else {
            finalizarJogo();
        }
    }

    function calcularNotaFase() {
        let acertos = 0;
        let erros = 0;
        const cards = document.querySelectorAll('.item');
        let totalCorretosNaTela = 0;

        cards.forEach(el => {
            const sel = el.classList.contains('selected');
            const ehCorreto = el.dataset.tipo === metaAtual;
            if(ehCorreto) totalCorretosNaTela++;
            if(sel && ehCorreto) acertos++;
            if(sel && !ehCorreto) erros++;
        });

        let notaFase = (totalCorretosNaTela > 0) ? (acertos / totalCorretosNaTela) : 0;
        notaFase -= (erros * 0.2); 
        if (notaFase < 0) notaFase = 0;
        somaNotas += notaFase;
    }

    function finalizarJogo() {
        document.getElementById('jogo').style.display = 'none';
        document.getElementById('tela-nota').style.display = 'flex';
        let notaFinal = Math.round(somaNotas);
        if (notaFinal > 10) notaFinal = 10;
        document.getElementById('valor-nota').innerText = notaFinal;
    }

    iniciarFase();
</script>
</body>
</html>
